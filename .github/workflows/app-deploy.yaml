name: Tasky App CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "app/tasky/**"
      - "helm/tasky/**"
      - ".github/workflows/app-deploy.yaml"

  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: WizTestv1EKS
  NAMESPACE: tasky-app
  RELEASE_NAME: tasky
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/tasky-app

jobs:
  build-and-deploy:
    name: Build and deploy Tasky
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_REPOSITORY:${{ github.sha }} \
            -t $IMAGE_REPOSITORY:latest \
            app/tasky

      - name: Push Docker image
        run: |
          docker push $IMAGE_REPOSITORY:${{ github.sha }}
          docker push $IMAGE_REPOSITORY:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy with Helm
        run: |
          helm upgrade --install $RELEASE_NAME helm/tasky \
            --namespace $NAMESPACE \
            --create-namespace \
            --set image.repository=$IMAGE_REPOSITORY \
            --set image.tag=${{ github.sha }} \
            --set-string env.mongodbUri="${{ secrets.MONGODB_URI }}" \
            --set-string env.secretKey="${{ secrets.TASKY_SECRET_KEY }}"

      - name: Verify deployment
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE